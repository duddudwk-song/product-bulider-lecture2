<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 - 강아지 vs 고양이</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4028443023833942"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-4028443023833942">
</head>
<body>
    <div class="app-container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        
        <!-- Start Screen -->
        <section id="start-screen" class="screen active">
            <h1 class="main-title">AI 동물상 테스트</h1>
            <p class="subtitle">나는 강아지상일까, 고양이상일까?<br>AI가 분석하는 나의 얼굴상!</p>
            
            <!-- 상단 광고 단위 -->
            <div class="ad-container">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-4028443023833942"
                     data-ad-slot="YOUR_AD_SLOT_HERE"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>

            <div class="mascot">🐶🐱</div>
            
            <div class="upload-area" id="upload-area">
                <input type="file" id="image-input" accept="image/*" hidden>
                <div class="upload-content">
                    <div class="upload-icon">📸</div>
                    <p>사진을 올리거나 눌러서 업로드</p>
                    <span>(사진은 어디에도 저장되지 않습니다)</span>
                </div>
            </div>
            
            <div class="start-actions">
                <button id="contact-btn" class="text-link-btn">제휴 문의하기</button>
            </div>
        </section>

        <!-- Loading Screen -->
        <section id="loading-screen" class="screen hidden">
            <div class="loader"></div>
            <p class="loading-text">AI가 당신의 얼굴을 분석 중입니다...</p>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="screen hidden">
            <h2 class="result-title">분석 결과</h2>
            
            <!-- 결과창 광고 단위 -->
            <div class="ad-container">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-4028443023833942"
                     data-ad-slot="YOUR_AD_SLOT_HERE"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>

            <div class="result-card">
                <div class="image-preview-wrapper">
                    <img id="face-image" src="" alt="User Face">
                </div>
                <div class="result-message">
                    <span class="animal-emoji" id="result-emoji">🐶</span>
                    <h3 id="result-animal-name">강아지상</h3>
                    <p id="result-description">귀엽고 친근한 매력의 소유자!</p>
                </div>
            </div>

            <div class="analysis-details" id="analysis-details">
                <!-- Progress bars will be injected here -->
            </div>

            <div class="action-buttons">
                <button id="restart-btn" class="secondary-btn">다시 하기</button>
                <button id="share-btn" class="primary-btn">결과 공유하기</button>
            </div>
        </section>

        <!-- Contact Screen -->
        <section id="contact-screen" class="screen hidden">
            <div class="screen-header">
                <button id="contact-back-btn" class="back-btn">←</button>
                <h2 class="section-title">제휴 문의</h2>
            </div>
            <form id="contact-form" action="https://formspree.io/f/xojnbodv" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">성함/업체명</label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" placeholder="제휴 관련 문의 내용을 입력해주세요." required></textarea>
                </div>
                <button type="submit" id="contact-submit" class="primary-btn full-width">문의 보내기</button>
                <div id="form-status" class="form-status hidden"></div>
            </form>
        </section>
    </div>

    <div class="comments-container">
        <!-- 하단 광고 단위 -->
        <div class="ad-container" style="margin-bottom: 20px;">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-4028443023833942"
                 data-ad-slot="YOUR_AD_SLOT_HERE"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
        <div id="disqus_thread"></div>
    </div>

    <!-- TensorFlow & Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = window.location.pathname;
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder2333.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <script src="main.js"></script>
</body>
</html>
