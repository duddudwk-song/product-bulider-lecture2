<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 남배우 64강</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        <!-- Start Screen -->
        <section id="start-screen" class="screen active">
            <h1 class="main-title">한국 남배우<br>이상형 월드컵</h1>
            <p class="subtitle">대한민국 최고의 미남 배우 64명 중<br>당신의 최애를 찾아보세요!</p>
            <div class="mascot">🏆</div>
            <button id="start-btn" class="primary-btn">게임 시작하기 (64강)</button>
        </section>

        <!-- Game Screen -->
        <section id="game-screen" class="screen hidden">
            <div class="game-header">
                <span class="round-badge" id="round-badge">64강</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="match-count" id="match-count">1 / 32</span>
            </div>
            
            <div class="battle-arena">
                <div class="candidate-card" id="candidate-1">
                    <div class="img-wrapper">
                        <img src="" alt="Candidate 1" id="img-1">
                        <div class="overlay"></div>
                    </div>
                    <div class="name-tag" id="name-1">이름 1</div>
                </div>
                
                <div class="vs-badge">VS</div>

                <div class="candidate-card" id="candidate-2">
                    <div class="img-wrapper">
                        <img src="" alt="Candidate 2" id="img-2">
                        <div class="overlay"></div>
                    </div>
                    <div class="name-tag" id="name-2">이름 2</div>
                </div>
            </div>
        </section>

        <!-- Winner Screen -->
        <section id="winner-screen" class="screen hidden">
            <div class="confetti-container"></div>
            <h2 class="winner-title">나의 이상형 월드컵 우승!</h2>
            
            <div class="winner-card">
                <div class="crown">👑</div>
                <div class="winner-img-wrapper">
                    <img src="" alt="Winner" id="winner-img">
                </div>
                <h3 class="winner-name" id="winner-name">우승자 이름</h3>
            </div>

            <div class="action-buttons">
                <button id="restart-btn" class="secondary-btn">다시 하기</button>
                <button id="share-btn" class="primary-btn">결과 공유하기</button>
            </div>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
